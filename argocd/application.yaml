apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootcamp1-app
  namespace: argocd
spec:
  project: default
  source: 
    repoURL: https://github.com/vijai-veerapandian/bootcamp-w2.git
    targetRevision: main
    path: helm/bootcamp1-app
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: bootcamp1-app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
